<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Now Showing — Find Your Next Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="sprocket-rail top" aria-hidden="true"></div>

  <header class="marquee">
    <div class="marquee-frame">
      <p class="marquee-eyebrow">Tonight's Feature</p>
      <h1 class="marquee-title">NOW SHOWING</h1>
      <p class="marquee-sub">A picture house that finds your next watch</p>
    </div>
  </header>

  <main>

    <section class="search-section" aria-label="Search for a movie">
      <div class="search-box">
        <input
          id="searchInput"
          type="text"
          placeholder="Type a movie you love… (e.g. Whiplash)"
          autocomplete="off"
        />
        <button id="searchBtn">Find Similar</button>
      </div>
      <div id="searchResults" class="poster-strip" hidden></div>
    </section>

    <section class="mood-section" aria-label="Browse by mood">
      <h2 class="section-heading">Or pick tonight's mood</h2>
      <div id="moodRow" class="mood-row"></div>
    </section>

    <section class="results-section">
      <h2 id="resultsHeading" class="section-heading">Trending This Week</h2>
      <div id="resultsGrid" class="poster-grid"></div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Posters &amp; data from <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a>. This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
  </footer>

  <div class="sprocket-rail bottom" aria-hidden="true"></div>

  <div id="detailModal" class="modal" hidden>
    <div class="modal-content">
      <button id="modalClose" class="modal-close" aria-label="Close">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
